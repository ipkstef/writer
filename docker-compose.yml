services:
  writer:
    build: .
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-reverse-proxy}
      - traefik.http.routers.writer.rule=Host(`${WRITER_HOST:-writer.localhost}`)
      - traefik.http.routers.writer.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.writer.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.writer.loadbalancer.server.port=80
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    name: ${TRAEFIK_NETWORK:-reverse-proxy}
    external: true
